title: OpenAgent
tagline: "The open-source Claude Code alternative — agentic coding for any AI provider"
description: "OpenAgent is an open-source agentic coding CLI that works with Claude, GPT-5, Gemini, Grok, Ollama, LM Studio, MLX and 12+ providers. A free, multi-provider alternative to Claude Code. Apache 2.0."
url: https://ask-sol.github.io
baseurl: "/openagent"
author: ask-sol
twitter:
  username: asksol
  card: summary_large_image
social:
  name: OpenAgent
  links:
    - https://github.com/ask-sol/openagent

theme: just-the-docs

color_scheme: mintlify

logo: "/images/logo.svg"

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: true

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/ask-sol/openagent"
  "Star":
    - "https://github.com/ask-sol/openagent/stargazers"

aux_links_new_tab: true

nav_external_links:
  - title: GitHub
    url: https://github.com/ask-sol/openagent
    hide_icon: false
    opens_in_new_tab: true

footer_content: ""
back_to_top: true
back_to_top_text: "Back to top"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

mermaid:
  version: "10.6.1"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor

permalink: pretty

ga_tracking_anonymize_ip: true
